<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Ale Runner - Foge da Metrópole</title>
    <style>
         :root {
            --sky-top: #0b1029;
            --sky-mid: #1c2451;
            --sky-glow: #ff2e63;
            --neon-cyan: #08f7fe;
            --neon-yellow: #ffd460;
            --ground: #13141f;
            --ground-line: #2c2f4a;
            --panel-bg: rgba(11, 16, 41, 0.86);
            --text-main: #f4f4f9;
            --text-dim: #9aa3c7;
        }
        
        * {
            box-sizing: border-box;
        }
        
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #05060f;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        
        #wrap {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        
        #stage {
            position: relative;
            width: min(96vw, 900px);
            aspect-ratio: 900 / 420;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 0 0 2px rgba(8, 247, 254, 0.15), 0 20px 60px rgba(0, 0, 0, 0.65), inset 0 0 60px rgba(8, 247, 254, 0.05);
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 62%, var(--ground) 62%);
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #hud {
            position: absolute;
            top: 14px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0 18px;
            pointer-events: none;
            font-variant-numeric: tabular-nums;
        }
        
        #scoreBox {
            color: var(--neon-yellow);
            font-weight: 700;
            font-size: clamp(14px, 2.4vw, 20px);
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 212, 96, 0.5);
        }
        
        #best {
            color: var(--text-dim);
            font-size: clamp(10px, 1.6vw, 13px);
            margin-top: 3px;
            font-weight: 500;
        }
        
        #hint {
            color: var(--text-dim);
            font-size: clamp(10px, 1.7vw, 13px);
            background: rgba(0, 0, 0, 0.25);
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid rgba(154, 163, 199, 0.25);
        }
        
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: linear-gradient(180deg, rgba(5, 6, 15, 0.55), rgba(5, 6, 15, 0.75));
            backdrop-filter: blur(2px);
            text-align: center;
            padding: 20px;
        }
        
        .overlay.hidden {
            display: none;
        }
        
        .title {
            color: var(--text-main);
            font-size: clamp(22px, 4.4vw, 34px);
            font-weight: 800;
            letter-spacing: 0.5px;
            margin: 0;
            text-shadow: 0 0 18px rgba(8, 247, 254, 0.45);
        }
        
        .title span {
            color: var(--sky-glow);
            text-shadow: 0 0 18px rgba(255, 46, 99, 0.6);
        }
        
        .subtitle {
            color: var(--text-dim);
            font-size: clamp(12px, 2.4vw, 15px);
            margin: 0;
            max-width: 480px;
            line-height: 1.5;
        }
        
        .scoreLine {
            color: var(--neon-cyan);
            font-weight: 700;
            font-size: clamp(16px, 3vw, 22px);
            text-shadow: 0 0 14px rgba(8, 247, 254, 0.5);
        }
        
        button {
            background: linear-gradient(180deg, var(--neon-cyan), #05b8c2);
            color: #05131a;
            border: none;
            padding: 12px 26px;
            border-radius: 30px;
            font-weight: 800;
            font-size: clamp(13px, 2.4vw, 16px);
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(8, 247, 254, 0.35);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(8, 247, 254, 0.5);
        }
        
        button:active {
            transform: translateY(0px) scale(0.98);
        }
        
        #tapHint {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            color: var(--text-dim);
            font-size: clamp(9px, 1.6vw, 11px);
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="wrap">
        <div id="stage">
            <canvas id="game"></canvas>
            <div id="hud">
                <div>
                    <div id="scoreBox">000000</div>
                    <div id="best">recorde 000000</div>
                </div>
                <div id="hint">espaço / toque para pular</div>
            </div>

            <div class="overlay" id="startOverlay">
                <h1 class="title">ALE <span>RUNNER</span></h1>
                <p class="subtitle">Corra pela metrópole e pule por cima de quem dorme no meio do caminho. Quanto mais longe, mais rápido fica.</p>
                <button id="startBtn">Começar a correr</button>
            </div>

            <div class="overlay hidden" id="overOverlay">
                <h1 class="title">GAME <span>OVER</span></h1>
                <p class="scoreLine" id="finalScore">Pontuação: 0</p>
                <p class="subtitle" id="newBestMsg" style="display:none;">Novo recorde! 🎉</p>
                <button id="retryBtn">Correr de novo</button>
            </div>

            <div id="tapHint">dica: segure o pulo perto do chão para pular mais longe</div>
        </div>
    </div>

1t76J73+f5HY7rW+ePejAAAAAElFTkSuQmCC";

            // ---- ground & sky geometry ----
            const GROUND_Y = 262; // top of ground band in logical coords
            const HORIZON = GROUND_Y;

            // player
            const player = {
                w: 78,
                h: 80,
                x: 96,
                y: 0,
                vy: 0,
                grounded: true,
                rot: 0
            };
            player.y = GROUND_Y - player.h;

            const GRAVITY = 0.62;
            const JUMP_V = -13.6;

            // obstacles
            let obstacles = [];
            const OBS_W = 132,
                OBS_H = 44; // aspect ~320x107 scaled

            // buildings (parallax layers)
            function makeSkyline(count, minH, maxH, seedOffset) {
                const arr = [];
                let x = -50;
                for (let i = 0; i < count; i++) {
                    const w = 40 + Math.random() * 55;
                    const h = minH + Math.random() * (maxH - minH);
                    arr.push({
                        x,
                        w,
                        h,
                        lit: Math.random()
                    });
                    x += w + 14 + Math.random() * 20;
                }
                return arr;
            }
            let farBuildings = makeSkyline(26, 70, 150);
            let nearBuildings = makeSkyline(20, 100, 210);

            // window flicker seeds
            const flicker = [];
            for (let i = 0; i < 400; i++) flicker.push(Math.random());

            let gameSpeed = 6.2;
            const BASE_SPEED = 6.2;
            const MAX_SPEED = 13.5;
            let distance = 0;
            let score = 0;
            let best = 0;
            try {
                best = parseInt(localStorage_dummy()) || 0;
            } catch (e) {
                best = 0;
            }

            function localStorage_dummy() {
                return 0;
            } // artifacts: no browser storage, keep in-memory only

            let running = false;
            let gameOver = false;
            let spawnTimer = 0;
            let nextSpawnGap = 0;
            let frame = 0;

            const scoreBox = document.getElementById('scoreBox');
            const bestBox = document.getElementById('best');
            const startOverlay = document.getElementById('startOverlay');
            const overOverlay = document.getElementById('overOverlay');
            const startBtn = document.getElementById('startBtn');
            const retryBtn = document.getElementById('retryBtn');
            const finalScoreEl = document.getElementById('finalScore');
            const newBestMsg = document.getElementById('newBestMsg');

            function pad(n) {
                return String(Math.floor(n)).padStart(6, '0');
            }

            function resetGame() {
                obstacles = [];
                distance = 0;
                score = 0;
                gameSpeed = BASE_SPEED;
                player.y = GROUND_Y - player.h;
                player.vy = 0;
                player.grounded = true;
                player.rot = 0;
                spawnTimer = 0;
                nextSpawnGap = 70 + Math.random() * 40;
                frame = 0;
                gameOver = false;
            }

            function startGame() {
                resetGame();
                running = true;
                startOverlay.classList.add('hidden');
                overOverlay.classList.add('hidden');
            }

            function endGame() {
                running = false;
                gameOver = true;
                const finalScoreNum = Math.floor(score);
                finalScoreEl.textContent = "Pontuação: " + finalScoreNum;
                if (finalScoreNum > best) {
                    best = finalScoreNum;
                    newBestMsg.style.display = 'block';
                } else {
                    newBestMsg.style.display = 'none';
                }
                bestBox.textContent = "recorde " + pad(best);
                overOverlay.classList.remove('hidden');
            }

            function doJump() {
                if (!running) {
                    return;
                }
                if (player.grounded) {
                    player.vy = JUMP_V;
                    player.grounded = false;
                }
            }

            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space' || e.code === 'ArrowUp') {
                    e.preventDefault();
                    if (!running && !gameOver) {
                        startGame();
                    } else {
                        doJump();
                    }
                }
            });
            canvas.addEventListener('pointerdown', () => {
                if (!running && !gameOver) {
                    startGame();
                    return;
                }
                doJump();
            });
            document.getElementById('stage').addEventListener('pointerdown', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                if (!running && !gameOver) {
                    return;
                }
                doJump();
            });

            startBtn.addEventListener('click', startGame);
            retryBtn.addEventListener('click', startGame);

            function spawnObstacle() {
                const scale = 0.85 + Math.random() * 0.5;
                const w = OBS_W * scale;
                const h = OBS_H * scale;
                obstacles.push({
                    x: LW + 20,
                    y: GROUND_Y - h + 6,
                    w,
                    h
                });
            }

            function update() {
                frame++;
                distance += gameSpeed;
                score = distance / 12;
                gameSpeed = Math.min(MAX_SPEED, BASE_SPEED + distance / 2200);

                // player physics
                player.vy += GRAVITY;
                player.y += player.vy;
                if (player.y >= GROUND_Y - player.h) {
                    player.y = GROUND_Y - player.h;
                    player.vy = 0;
                    player.grounded = true;
                }
                // tilt while jumping
                const targetRot = player.grounded ? 0 : Math.max(-0.18, Math.min(0.12, player.vy * 0.012));
                player.rot += (targetRot - player.rot) * 0.25;

                // obstacles
                spawnTimer++;
                if (spawnTimer > nextSpawnGap) {
                    spawnObstacle();
                    spawnTimer = 0;
                    const gapReduction = Math.min(38, distance / 300);
                    nextSpawnGap = (68 - gapReduction) + Math.random() * 40;
                }
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].x -= gameSpeed;
                    if (obstacles[i].x + obstacles[i].w < -20) {
                        obstacles.splice(i, 1);
                    }
                }

                // collision (shrunk hitboxes for fairness)
                const px = player.x + player.w * 0.22;
                const py = player.y + player.h * 0.28;
                const pw = player.w * 0.56;
                const ph = player.h * 0.62;
                for (const o of obstacles) {
                    const ox = o.x + o.w * 0.1;
                    const oy = o.y + o.h * 0.15;
                    const ow = o.w * 0.8;
                    const oh = o.h * 0.75;
                    if (px < ox + ow && px + pw > ox && py < oy + oh && py + ph > oy) {
                        endGame();
                        break;
                    }
                }

                // parallax buildings scroll & recycle
                scrollBuildings(farBuildings, gameSpeed * 0.25);
                scrollBuildings(nearBuildings, gameSpeed * 0.55);

                scoreBox.textContent = pad(score);
            }

            function scrollBuildings(arr, spd) {
                let maxX = -Infinity;
                for (const b of arr) {
                    b.x -= spd;
                    if (b.x + b.w > maxX) maxX = b.x + b.w;
                }
                for (const b of arr) {
                    if (b.x + b.w < -10) {
                        b.x = maxX + 14 + Math.random() * 20;
                        b.w = 40 + Math.random() * 55;
                        maxX = b.x + b.w;
                    }
                }
            }

            function drawSky() {
                const grad = ctx.createLinearGradient(0, 0, 0, HORIZON);
                grad.addColorStop(0, '#0b1029');
                grad.addColorStop(0.55, '#181f47');
                grad.addColorStop(1, '#232a5c');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, LW, HORIZON);

                // moon
                ctx.save();
                ctx.beginPath();
                ctx.fillStyle = 'rgba(255,212,96,0.85)';
                ctx.shadowColor = 'rgba(255,212,96,0.55)';
                ctx.shadowBlur = 25;
                ctx.arc(LW - 90, 60, 26, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // stars
                ctx.fillStyle = 'rgba(255,255,255,0.55)';
                for (let i = 0; i < 60; i++) {
                    const sx = (i * 137.5) % LW;
                    const sy = (i * 71) % (HORIZON - 40) + 6;
                    const tw = 0.4 + 0.6 * Math.abs(Math.sin(frame * 0.02 + i));
                    ctx.globalAlpha = tw * 0.6;
                    ctx.fillRect(sx, sy, 2, 2);
                }
                ctx.globalAlpha = 1;
            }

            function drawBuildings(arr, baseColor, winColor, alpha) {
                ctx.globalAlpha = alpha;
                for (const b of arr) {
                    const top = HORIZON - b.h;
                    ctx.fillStyle = baseColor;
                    ctx.fillRect(b.x, top, b.w, b.h + 4);
                    // windows
                    const cols = Math.max(1, Math.floor(b.w / 14));
                    const rows = Math.max(1, Math.floor(b.h / 18));
                    for (let r = 0; r < rows; r++) {
                        for (let c = 0; c < cols; c++) {
                            const wx = b.x + 5 + c * 14;
                            const wy = top + 8 + r * 18;
                            if (wx + 6 > b.x + b.w - 3) continue;
                            const idx = (Math.floor(b.x) + r * 7 + c * 13) % flicker.length;
                            const on = flicker[Math.abs(idx)] > 0.45;
                            ctx.fillStyle = on ? winColor : 'rgba(255,255,255,0.04)';
                            ctx.fillRect(wx, wy, 6, 8);
                        }
                    }
                }
                ctx.globalAlpha = 1;
            }

            function drawGround() {
                ctx.fillStyle = '#13141f';
                ctx.fillRect(0, HORIZON, LW, LH - HORIZON);

                // road glow line
                ctx.fillStyle = 'rgba(8,247,254,0.5)';
                ctx.fillRect(0, HORIZON, LW, 2);

                // scrolling dashes
                ctx.fillStyle = '#2c2f4a';
                const dashW = 34,
                    gap = 26;
                const off = (distance * 0.9) % (dashW + gap);
                for (let x = -off; x < LW; x += dashW + gap) {
                    ctx.fillRect(x, HORIZON + 26, dashW, 5);
                }
            }

            function drawPlayer() {
                ctx.save();
                const cx = player.x + player.w / 2;
                const cy = player.y + player.h / 2;
                ctx.translate(cx, cy);
                ctx.rotate(player.rot);
                // soft shadow under player scaled by height off ground
                const groundGap = (GROUND_Y - (player.y + player.h));
                const shadowScale = Math.max(0.35, 1 - groundGap / 140);
                ctx.save();
                ctx.translate(0, (GROUND_Y - cy) - 4);
                ctx.scale(shadowScale, shadowScale * 0.4);
                ctx.beginPath();
                ctx.fillStyle = 'rgba(0,0,0,0.35)';
                ctx.ellipse(0, 0, player.w * 0.4, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                if (aleImg.complete && aleImg.naturalWidth) {
                    ctx.drawImage(aleImg, -player.w / 2, -player.h / 2, player.w, player.h);
                } else {
                    ctx.fillStyle = '#ffd460';
                    ctx.fillRect(-player.w / 2, -player.h / 2, player.w, player.h);
                }
                ctx.restore();
            }

            function drawObstacles() {
                for (const o of obstacles) {
                    ctx.save();
                    // contact shadow
                    ctx.fillStyle = 'rgba(0,0,0,0.32)';
                    ctx.beginPath();
                    ctx.ellipse(o.x + o.w / 2, GROUND_Y - 2, o.w * 0.42, 7, 0, 0, Math.PI * 2);
                    ctx.fill();
                    if (obsImg.complete && obsImg.naturalWidth) {
                        ctx.drawImage(obsImg, o.x, o.y, o.w, o.h);
                    } else {
                        ctx.fillStyle = '#ff2e63';
                        ctx.fillRect(o.x, o.y, o.w, o.h);
                    }
                    ctx.restore();
                }
            }

            function render() {
                ctx.clearRect(0, 0, LW, LH);
                drawSky();
                drawBuildings(farBuildings, '#141a3a', 'rgba(255,212,96,0.55)', 0.75);
                drawBuildings(nearBuildings, '#0e1230', 'rgba(8,247,254,0.5)', 0.95);
                drawGround();
                drawObstacles();
                drawPlayer();

                // vignette
                const vg = ctx.createRadialGradient(LW / 2, LH / 2, LH * 0.3, LW / 2, LH / 2, LW * 0.7);
                vg.addColorStop(0, 'rgba(0,0,0,0)');
                vg.addColorStop(1, 'rgba(0,0,0,0.35)');
                ctx.fillStyle = vg;
                ctx.fillRect(0, 0, LW, LH);
            }

            function loop() {
                if (running) {
                    update();
                }
                render();
                requestAnimationFrame(loop);
            }

            resize();
            bestBox.textContent = "recorde " + pad(best);
            scoreBox.textContent = pad(0);
            requestAnimationFrame(loop);
        })();
    </script>
</body>

</html>
